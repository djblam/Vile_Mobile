<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Creatures Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: pan-y;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #e0e0e0;
            text-align: center;
            padding: 0 1rem;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .carousel {
            display: flex;
            transition: transform 0.3s ease-out;
            height: 100%;
            align-items: center;
        }

        .slide {
            min-width: 100vw;
            max-width: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .slide img {
            max-width: 90%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .image-name {
            text-align: center;
            margin-top: 1rem;
            font-size: 1rem;
            color: #b0b0b0;
            padding: 0 1rem;
        }

        .indicators {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 1rem;
            max-width: 300px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #444;
            transition: background-color 0.3s, transform 0.3s;
        }

        .indicator.active {
            background-color: #fff;
            transform: scale(1.3);
        }

        .nav-hint {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }

        .counter {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #888;
        }

        /* Arrow buttons for non-touch devices */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 2rem;
            padding: 1rem 0.5rem;
            cursor: pointer;
            z-index: 10;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-btn.prev {
            left: 10px;
        }

        .nav-btn.next {
            right: 10px;
        }

        @media (max-width: 600px) {
            .nav-btn {
                padding: 0.5rem 0.3rem;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>Creatures Gallery</h1>
    
    <div class="carousel-container">
        <button class="nav-btn prev" onclick="prevSlide()">‹</button>
        <div class="carousel" id="carousel"></div>
        <button class="nav-btn next" onclick="nextSlide()">›</button>
    </div>
    
    <div class="image-name" id="imageName"></div>
    <div class="counter" id="counter"></div>
    <div class="indicators" id="indicators"></div>
    <p class="nav-hint">Swipe or use arrows to navigate</p>

    <script>
        const images = [
            "Creatures/A_Vile_Twinkle_colour.gif",
            "Creatures/Admiral_Salvador_colour.gif",
            "Creatures/Alasdair_colour.gif",
            "Creatures/Boogieman_colour.gif",
            "Creatures/Browser_colour.gif",
            "Creatures/Candyman_colour.gif",
            "Creatures/Death_Surf_colour.gif",
            "Creatures/Gabriel_colour.gif",
            "Creatures/Ganthet_colour.gif",
            "Creatures/Gorb_colour.gif",
            "Creatures/Le_Doggard_colour.gif",
            "Creatures/Mark_my_words_colour.gif",
            "Creatures/Pimpernel_colour.gif",
            "Creatures/Poster_colour.gif",
            "Creatures/Prof_colour.gif",
            "Creatures/Sal_colour.gif",
            "Creatures/Skeletard_colour.gif",
            "Creatures/Skurler_colour.gif",
            "Creatures/The_Living_Nightmare_colour.gif",
            "Creatures/Vile_Skull_One_colour.gif",
            "Creatures/Vile_Skull_Two_colour.gif",
            "Creatures/cactus_nasty_colour.gif",
            "Creatures/grampa_colour.gif",
            "Creatures/lemon_spider_colour.gif",
            "Creatures/slurms_mcgee_colour.gif",
            "Creatures/spadoof_colour.gif"
        ];

        let currentIndex = 0;
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        const carousel = document.getElementById('carousel');
        const indicatorsContainer = document.getElementById('indicators');
        const imageName = document.getElementById('imageName');
        const counter = document.getElementById('counter');

        // Create slides
        images.forEach((src, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide';
            const img = document.createElement('img');
            img.src = src;
            img.alt = getImageName(src);
            img.loading = 'lazy';
            slide.appendChild(img);
            carousel.appendChild(slide);

            // Create indicator
            const indicator = document.createElement('div');
            indicator.className = 'indicator' + (index === 0 ? ' active' : '');
            indicator.onclick = () => goToSlide(index);
            indicatorsContainer.appendChild(indicator);
        });

        function getImageName(src) {
            return src.split('/').pop().replace('_colour.gif', '').replace(/_/g, ' ');
        }

        function updateCarousel() {
            carousel.style.transform = `translateX(-${currentIndex * 100}vw)`;
            
            // Update indicators
            document.querySelectorAll('.indicator').forEach((ind, i) => {
                ind.classList.toggle('active', i === currentIndex);
            });

            // Update image name
            imageName.textContent = getImageName(images[currentIndex]);
            
            // Update counter
            counter.textContent = `${currentIndex + 1} / ${images.length}`;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % images.length;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateCarousel();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateCarousel();
        }

        // Touch events for swipe
        carousel.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isDragging = true;
            carousel.style.transition = 'none';
        }, { passive: true });

        carousel.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX;
            const diff = currentX - startX;
            const offset = -currentIndex * window.innerWidth + diff;
            carousel.style.transform = `translateX(${offset}px)`;
        }, { passive: true });

        carousel.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            carousel.style.transition = 'transform 0.3s ease-out';
            
            const diff = currentX - startX;
            const threshold = window.innerWidth * 0.2;

            if (diff > threshold && currentIndex > 0) {
                prevSlide();
            } else if (diff < -threshold && currentIndex < images.length - 1) {
                nextSlide();
            } else {
                updateCarousel();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'ArrowRight') nextSlide();
        });

        // Initialize
        updateCarousel();
    </script>
</body>
</html>
