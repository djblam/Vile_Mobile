<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Creatures Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            min-height: 100vh; /* fallback for older browsers */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: pan-y;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #e0e0e0;
            text-align: center;
            padding: 0 1rem;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: visible;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .slide .frame {
            position: relative;
            background: transparent;
            border-radius: 20px;
            padding: 0;
            box-shadow: 
                0 0 15px rgba(168, 85, 247, 0.3),
                0 0 30px rgba(168, 85, 247, 0.2),
                0 0 45px rgba(168, 85, 247, 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide .frame::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(145deg, rgba(168, 85, 247, 0.6), rgba(139, 92, 246, 0.4), rgba(168, 85, 247, 0.6));
            z-index: -1;
            opacity: 0.7;
            filter: blur(1px);
        }

        .slide img {
            display: block;
            max-width: 280px;
            max-height: 50vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            background: #0a0a0f;
        }

        /* Center slide */
        .slide.center {
            z-index: 10;
            transform: translateX(0) scale(1);
            opacity: 1;
        }

        .slide.center .frame {
            box-shadow: 
                0 0 20px rgba(168, 85, 247, 0.4),
                0 0 40px rgba(168, 85, 247, 0.25),
                0 0 60px rgba(168, 85, 247, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.08);
        }

        /* Left slide */
        .slide.left {
            z-index: 5;
            transform: translateX(-65%) scale(0.75) rotateY(15deg);
            opacity: 0.7;
        }

        .slide.left .frame {
            box-shadow: 
                0 0 10px rgba(168, 85, 247, 0.2),
                0 0 20px rgba(168, 85, 247, 0.12);
        }

        /* Right slide */
        .slide.right {
            z-index: 5;
            transform: translateX(65%) scale(0.75) rotateY(-15deg);
            opacity: 0.7;
        }

        .slide.right .frame {
            box-shadow: 
                0 0 10px rgba(168, 85, 247, 0.2),
                0 0 20px rgba(168, 85, 247, 0.12);
        }

        /* Far left */
        .slide.far-left {
            z-index: 1;
            transform: translateX(-120%) scale(0.5) rotateY(25deg);
            opacity: 0.3;
        }

        /* Far right */
        .slide.far-right {
            z-index: 1;
            transform: translateX(120%) scale(0.5) rotateY(-25deg);
            opacity: 0.3;
        }

        /* Hidden slides */
        .slide.hidden {
            z-index: 0;
            transform: translateX(0) scale(0.3);
            opacity: 0;
            pointer-events: none;
        }

        .image-name {
            text-align: center;
            margin-top: 0.25rem;
            font-size: 2.0rem;
            font-family: 'Brush Script MT', 'Lucida Handwriting', 'Snell Roundhand', cursive;
            color: #c4b5fd;
            padding: 0 1rem;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .indicators {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 1rem;
            max-width: 300px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #333;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .indicator:hover {
            background-color: rgba(168, 85, 247, 0.5);
        }

        .indicator.active {
            background-color: #a855f7;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.8);
        }

        .nav-hint {
            margin-top: 1.5rem;
            margin-bottom: calc(2.5rem + env(safe-area-inset-bottom, 0));
            padding-bottom: 1rem;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
        }

        /* Arrow buttons for non-touch devices */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #c4b5fd;
            font-size: 2rem;
            padding: 1rem 0.7rem;
            cursor: pointer;
            z-index: 20;
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover {
            background: rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            color: #fff;
        }

        .nav-btn.prev {
            left: 15px;
        }

        .nav-btn.next {
            right: 15px;
        }

        @media (max-width: 600px) {
            .nav-btn {
                padding: 0.6rem 0.4rem;
                font-size: 1.5rem;
            }
            
            .slide img {
                max-width: 220px;
                max-height: 45vh;
            }
            
            .slide.left {
                transform: translateX(-55%) scale(0.7) rotateY(12deg);
            }
            
            .slide.right {
                transform: translateX(55%) scale(0.7) rotateY(-12deg);
            }
        }
    </style>
</head>
<body>
    <h1>The League</h1>
    
    <div class="carousel-container">
        <button class="nav-btn prev" onclick="prevSlide()">‹</button>
        <div class="carousel" id="carousel"></div>
        <button class="nav-btn next" onclick="nextSlide()">›</button>
    </div>
    
    <div class="image-name" id="imageName"></div>
    <div class="indicators" id="indicators"></div>
    <p class="nav-hint">Swipe or use arrows to navigate</p>

    <script>
        const images = [
            "Creatures/A_Vile_Twinkle_colour.png",
            "Creatures/Admiral_Salvador_colour.png",
            "Creatures/Alasdair_colour.png",
            "Creatures/Boogieman_colour.png",
            "Creatures/Browser_colour.png",
            "Creatures/Candyman_colour.png",
            "Creatures/Death_Surf_colour.png",
            "Creatures/Gabriel_colour.png",
            "Creatures/Ganthet_colour.png",
            "Creatures/Gorb_colour.png",
            "Creatures/Le_Doggard_colour.png",
            "Creatures/Mark_my_words_colour.png",
            "Creatures/Pimpernel_colour.png",
            "Creatures/Poster_colour.png",
            "Creatures/Prof_colour.png",
            "Creatures/Sal_colour.png",
            "Creatures/Skeletard_colour.png",
            "Creatures/Skurler_colour.png",
            "Creatures/The_Living_Nightmare_colour.png",
            "Creatures/Vile_Skull_One_colour.png",
            "Creatures/Vile_Skull_Two_colour.png",
            "Creatures/cactus_nasty_colour.png",
            "Creatures/grampa_colour.png",
            "Creatures/lemon_spider_colour.png",
            "Creatures/slurms_mcgee_colour.png",
            "Creatures/spadoof_colour.png"
        ];

        let currentIndex = 0;
        let startX = 0;
        let isDragging = false;
        const slides = [];

        const carousel = document.getElementById('carousel');
        const indicatorsContainer = document.getElementById('indicators');
        const imageName = document.getElementById('imageName');

        // Create slides with frames
        images.forEach((src, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide hidden';
            slide.dataset.index = index;
            
            const frame = document.createElement('div');
            frame.className = 'frame';
            
            const img = document.createElement('img');
            img.src = src;
            img.alt = getImageName(src);
            img.loading = index < 5 ? 'eager' : 'lazy';
            
            frame.appendChild(img);
            slide.appendChild(frame);
            carousel.appendChild(slide);
            slides.push(slide);

            // Click on side slides to navigate
            slide.addEventListener('click', () => {
                if (slide.classList.contains('left') || slide.classList.contains('far-left')) {
                    prevSlide();
                } else if (slide.classList.contains('right') || slide.classList.contains('far-right')) {
                    nextSlide();
                }
            });

            // Create indicator
            const indicator = document.createElement('div');
            indicator.className = 'indicator' + (index === 0 ? ' active' : '');
            indicator.onclick = () => goToSlide(index);
            indicatorsContainer.appendChild(indicator);
        });

        function getImageName(src) {
            return src.split('/').pop().replace('_colour.png', '').replace(/_/g, ' ');
        }

        function getRelativeIndex(index) {
            const total = images.length;
            let diff = index - currentIndex;
            
            // Handle wrap-around for seamless looping
            if (diff > total / 2) diff -= total;
            if (diff < -total / 2) diff += total;
            
            return diff;
        }

        function updateCarousel() {
            slides.forEach((slide, index) => {
                const relativePos = getRelativeIndex(index);
                
                // Remove all position classes
                slide.classList.remove('center', 'left', 'right', 'far-left', 'far-right', 'hidden');
                
                // Assign position class based on relative position
                if (relativePos === 0) {
                    slide.classList.add('center');
                } else if (relativePos === -1) {
                    slide.classList.add('left');
                } else if (relativePos === 1) {
                    slide.classList.add('right');
                } else if (relativePos === -2) {
                    slide.classList.add('far-left');
                } else if (relativePos === 2) {
                    slide.classList.add('far-right');
                } else {
                    slide.classList.add('hidden');
                }
            });
            
            // Update indicators
            document.querySelectorAll('.indicator').forEach((ind, i) => {
                ind.classList.toggle('active', i === currentIndex);
            });

            // Update image name
            imageName.textContent = getImageName(images[currentIndex]);
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % images.length;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateCarousel();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateCarousel();
        }

        // Touch events for swipe
        let touchStartX = 0;
        let touchEndX = 0;

        carousel.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            isDragging = true;
        }, { passive: true });

        carousel.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            touchEndX = e.touches[0].clientX;
        }, { passive: true });

        carousel.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            
            const diff = touchEndX - touchStartX;
            const threshold = 50;

            if (diff > threshold) {
                prevSlide();
            } else if (diff < -threshold) {
                nextSlide();
            }
            
            touchStartX = 0;
            touchEndX = 0;
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'ArrowRight') nextSlide();
        });

        // Initialize
        updateCarousel();
    </script>
</body>
</html>
